services:
  # --------------------------------------------------------------------------------
  # BACKEND SERVICE (Docker Container)
  # --------------------------------------------------------------------------------
  - type: web
    name: intranet-backend
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: intranet-portal/backend
    dockerContext: intranet-portal/backend
    dockerfilePath: intranet-portal/backend/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: intranet-db
          property: connectionString
      - key: SecuritySettings__IPWhitelist__Enabled
        value: "false"

  # --------------------------------------------------------------------------------
  # FRONTEND SERVICE (Docker Container)
  # --------------------------------------------------------------------------------
  - type: web
    name: intranet-frontend
    runtime: docker
    region: frankfurt
    plan: free
    rootDir: intranet-portal/frontend
    dockerContext: intranet-portal/frontend
    dockerfilePath: intranet-portal/frontend/Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: intranet-backend
          property: host
        # DİKKAT: "property: host" sadece domain'i (örn. intranet-backend.onrender.com) verir.
        # Frontend, https:// eklemeyi bilmiyorsa kodda güncelleme gerekebilir.
        # Şimdilik bu şekilde push ediyoruz. Eğer API hatası alırsak,
        # Render Dashboard'dan bu Environment Variable'ı elle güncelleyip "https://..." yapacağız.

databases:
  # --------------------------------------------------------------------------------
  # DATABASE (PostgreSQL)
  # --------------------------------------------------------------------------------
  - name: intranet-db
    region: frankfurt
    plan: free
    databaseName: intranet_db # Düzeltildi: Küçük harf
    user: intranet_user

version: "1"
