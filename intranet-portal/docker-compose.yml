services:
  database:
    image: postgres:18.3-trixie
    container_name: intranet-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - intranet_fresh_v18:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Dışarıdan DB erişimi istersen açık kalsın
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: intranet-backend
    working_dir: /app
    # .csproj dosyasını nerede olursa olsun bulması için wildcard (*) ekledik
    command: >
      sh -c "dotnet run --project **/IntranetPortal.API.csproj --urls 'http://0.0.0.0:8080'"
    ports:
      - "5179:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=IntranetPortal
      - JwtSettings__Audience=IntranetPortalUsers
      - JwtSettings__ExpirationInMinutes=480
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: intranet-frontend
    ports:
      - "5173:5173" # VPS'in 5173 portunu frontend'e bağladık
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - backend

volumes:
  intranet_fresh_v18:
