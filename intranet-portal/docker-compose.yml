services:
  database:
    image: postgres:18.3-trixie
    container_name: intranet-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - intranet_fresh_v18:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: intranet-backend
    working_dir: /app
    # Buradaki çift $ işareti ( $$ ) önemli, Docker'ın hata vermesini önler
    command: >
      sh -c "dotnet run --project $$(find . -name 'IntranetPortal.API.csproj' | head -n 1) --urls 'http://0.0.0.0:8080'"
    ports:
      - "5179:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      # Buraya JwtSettings ve diğerlerini eklemeyi unutma (varsa)
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: intranet-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - backend

volumes:
  intranet_fresh_v18:
