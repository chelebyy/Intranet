services:
  database:
    image: postgres:18.3-trixie
    container_name: intranet-db
  environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intranet_user -d IntranetDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: intranet-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/obj
      - /app/bin
    command: dotnet watch --project IntranetPortal.API/IntranetPortal.API.csproj --urls "http://0.0.0.0:8080"
    ports:
      - "5179:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=IntranetDB;Username=intranet_user;Password=DevPassword123!;
      - JwtSettings__SecretKey=DockerDevelopmentSecretKeyMustBe32CharsOrMore!
      - JwtSettings__Issuer=IntranetPortal
      - JwtSettings__Audience=IntranetPortalUsers
      - JwtSettings__ExpirationInMinutes=480
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: intranet-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5179/api
    depends_on:
      - backend

volumes:
  postgres_data:
